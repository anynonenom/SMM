name: Run Development Servers

on:
  push:
    branches: [develop]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours

jobs:
  dev-servers:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Node dependencies
        run: npm ci
      
      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Run Frontend Dev Server
        run: |
          npm run dev:frontend &
          sleep 30
          echo "Frontend dev server started"
      
      - name: Run Backend Dev Server
        run: |
          npm run dev:backend &
          sleep 30
          echo "Backend dev server started"
      
      - name: Health Check
        run: |
          curl -f http://localhost:3000 || echo "Frontend health check skipped"
          curl -f http://localhost:5000 || echo "Backend health check skipped"
        continue-on-error: true
      
      - name: Run Tests
        run: |
          cd frontend && npm run test:ci || true
          cd ../backend && npm run test || true
        continue-on-error: true
